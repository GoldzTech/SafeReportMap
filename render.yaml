services:
  - type: web
    name: safereportmap-backend
    runtime: python
    plan: free
    branch: main

    buildCommand: |
      cd backend
      pip install -r requirements/requirements.txt

    startCommand: |
      cd backend && \
      PYTHONPATH=.. alembic upgrade head && \
      PYTHONPATH=.. uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
      
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "False"

      - key: AI_PROVIDER
        value: openai

      - key: OPENAI_MODEL
        value: gpt-5-nano

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

      - key: TENANT_MODE
        value: single

      - key: DEMO_MODE
        value: "False"

      # Configure manualmente no painel do Render
      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: BACKEND_CORS_ORIGINS
        sync: false